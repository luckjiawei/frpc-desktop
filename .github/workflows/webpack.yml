name: Build and Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version: [22.12.0]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Rewrite SSH git URLs to HTTPS
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci --verbose
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_mintimeout: 10000
          npm_config_fetch_retry_maxtimeout: 60000
        timeout-minutes: 15

      # 非 main 分支、非 tag：只检测编译是否报错（仅在 ubuntu 跑，节省 CI 时间）
      - name: Check build
        if: ${{ matrix.os == 'ubuntu-latest' && !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' }}
        run: npm run build

      # main 分支：完整打包，不发布
      - name: Build Windows
        if: ${{ matrix.os == 'windows-latest' && github.ref == 'refs/heads/main' }}
        run: npm run build:electron:win

      - name: Build macOS
        if: ${{ matrix.os == 'macos-latest' && github.ref == 'refs/heads/main' }}
        run: npm run build:electron:mac

      - name: Build Linux
        if: ${{ matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main' }}
        run: npm run build:electron:linux

      # tag：完整打包并发布到 GitHub Release
      - name: Release Windows
        if: ${{ matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/') }}
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Release macOS
        if: ${{ matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/') }}
        run: npm run release:mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Release Linux
        if: ${{ matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/') }}
        run: npm run release:linux
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
